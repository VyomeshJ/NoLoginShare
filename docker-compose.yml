services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"   # Only frontend exposed
    depends_on:
      - backend

  backend:
    build: ./backend
    expose:
      - "3001"        # Only exposed to other containers
    env_file:
      - ./backend/.env
    environment:
      DB_PATH: /app/data/files.db
    volumes:
      - backend-data:/app/data
      - /uploads:/app/uploads

volumes:
  backend-data:
